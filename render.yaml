services:
  - type: web
    name: contract-compare
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && node server.js
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      - key: MONGO_URI
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_REFRESH_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: 15m

      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d

      - key: RESEND_API_KEY
        sync: false

      - key: EMAIL_FROM
        value: noreply@contract-compare.com

      - key: LOG_LEVEL
        value: info

      - key: AUTO_SEED_IF_EMPTY
        value: false

      - key: RATE_LIMIT_MAX
        value: "200"
